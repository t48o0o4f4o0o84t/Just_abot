name: Run Bot
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install library
        run: pip install pyTelegramBotAPI
      - name: Run Bot
        run: python just_abot.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
          
